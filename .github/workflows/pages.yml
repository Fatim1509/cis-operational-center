name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
    paths: [ 'dashboard/**', 'data/**', '.github/workflows/pages.yml' ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Pages
      uses: actions/configure-pages@v3

    - name: Create dashboard directory
      run: |
        mkdir -p _site
        cp -r dashboard/* _site/ 2>/dev/null || true
        cp -r data _site/ 2>/dev/null || true
        
        # Create index.html if it doesn't exist
        if [ ! -f _site/index.html ]; then
          cat > _site/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
          <title>CIS Dashboard</title>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <style>
            body { font-family: Arial, sans-serif; margin: 40px; }
            .container { max-width: 1200px; margin: 0 auto; }
            .header { text-align: center; margin-bottom: 40px; }
            .card { background: #f8f9fa; border-radius: 8px; padding: 20px; margin: 20px 0; }
            .status { display: inline-block; padding: 5px 10px; border-radius: 4px; }
            .online { background: #28a745; color: white; }
            .offline { background: #dc3545; color: white; }
          </style>
        </head>
        <body>
          <div class="container">
            <div class="header">
              <h1>🎯 CIS Dashboard</h1>
              <p>Center Intelligence System - Financial Intelligence Hub</p>
            </div>
            
            <div class="card">
              <h2>System Status</h2>
              <p><span class="status online">ONLINE</span> Last updated: <span id="last-update">Loading...</span></p>
            </div>
            
            <div class="card">
              <h2>Intelligence Data</h2>
              <div id="intelligence-data">Loading intelligence data...</div>
            </div>
            
            <div class="card">
              <h2>Quick Actions</h2>
              <button onclick="location.reload()">🔄 Refresh Data</button>
              <button onclick="window.open('https://github.com/YOUR_USERNAME/cis-operational-center')">
                📊 View Repository
              </button>
            </div>
          </div>
          
          <script>
            // Load intelligence data
            fetch('data/master_intel.json')
              .then(response => response.json())
              .then(data => {
                document.getElementById('intelligence-data').innerHTML = 
                  '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
              })
              .catch(err => {
                document.getElementById('intelligence-data').innerHTML = 
                  '<p>❌ No intelligence data available</p>';
              });
              
            // Update timestamp
            fetch('data/last_update.txt')
              .then(response => response.text())
              .then(text => {
                document.getElementById('last-update').textContent = text;
              })
              .catch(err => {
                document.getElementById('last-update').textContent = 'Unknown';
              });
          </script>
        </body>
        </html>
        EOF
        fi

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2

    - name: Log deployment
      run: |
        echo "🌐 CIS Dashboard deployed to: ${{ steps.deployment.outputs.page_url }}"
        echo "✅ Deployment completed successfully"