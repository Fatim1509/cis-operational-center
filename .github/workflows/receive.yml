name: Receive Intelligence Update

on:
  repository_dispatch:
    types: [cis-intelligence-update]

env:
  PYTHON_VERSION: '3.9'

jobs:
  process-intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml requests

    - name: Process intelligence payload
      run: |
        echo "📥 Processing intelligence update from ${{ github.event.client_payload.sender }}"
        echo "📊 Payload received at: ${{ github.event.client_payload.dispatch_time }}"
        
        # Save payload to file
        cat > data/incoming_intel.json << 'EOF'
        ${{ toJson(github.event.client_payload) }}
        EOF
        
        # Process the intelligence
        python api/process_intelligence.py --input data/incoming_intel.json --output data/master_intel.json
        
        echo "✅ Intelligence processed successfully"

    - name: Update dashboard
      run: |
        echo "🔄 Updating dashboard..."
        python dashboard/update_dashboard.py --data data/master_intel.json
        echo "✅ Dashboard updated"

    - name: Commit changes
      run: |
        git config --global user.name 'CIS Command Center'
        git config --global user.email 'cis-command@users.noreply.github.com'
        
        git add data/master_intel.json
        git add dashboard/index.html
        git commit -m "🔄 Intelligence update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
        git push origin main || echo "Push failed, continuing..."

    - name: Notify Discord
      if: always()
      run: |
        python api/notify_discord.py --webhook "${{ secrets.DISCORD_WEBHOOK }}" --status success
      continue-on-error: true

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: intelligence-update-${{ github.run_number }}
        path: |
          data/incoming_intel.json
          data/master_intel.json
        retention-days: 7